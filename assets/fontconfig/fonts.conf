<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Minimal fontconfig that silences "Cannot load default config file" on prod
  boxes that don't ship /etc/fonts/fonts.conf. We don't need fontconfig to find
  any system fonts because eventStatsImage.js inlines the Inter variable font
  directly into every rendered SVG via @font-face.
-->
<fontconfig>
  <cachedir>/tmp/.fontconfig-cache</cachedir>
</fontconfig>
